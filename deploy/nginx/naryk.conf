#
# /etc/nginx/sites-available/naryk
#
# Port 8081: two other projects on this box already hold 80/443 and 8080.
#
server {
    listen 8081;
    server_name _;
    root /var/www/naryk/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    client_max_body_size 100M;
    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # 1.3 GB of article images behind /storage, plus the stylesheet and the
    # ticker logos. Cache-bust on the stylesheet is a ?v= query, so the query
    # string has to stay part of the cache key — nginx does that by default.
    location ~* ^/(storage|assets|img)/.*\.(jpe?g|png|gif|webp|svg|ico|css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
